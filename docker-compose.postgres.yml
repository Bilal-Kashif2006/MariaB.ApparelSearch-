services:
  postgres:
    image: postgres:16
    container_name: bareeze-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resham_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data:ro

volumes:
  postgres_data:
